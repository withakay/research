[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"

[project]
name = "durable-outbox-file-sink"
version = "0.1.0"
description = "File sink plugin for durable-outbox JSONL publishing."
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Durable Outbox Maintainers" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.14",
    "Typing :: Typed",
]
dependencies = ["durable-outbox"]

[project.entry-points."durable_outbox.sinks"]
file = "durable_outbox_file_sink:build_file_sink"

[tool.uv.build-backend]
module-root = ""
module-name = "durable_outbox_file_sink"
source-include = ["LICENSE", "README.md", "pyproject.toml"]
