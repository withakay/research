[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"

[project]
name = "durable-outbox-cosmos-store"
version = "0.1.0"
description = "Azure Cosmos DB store plugin for durable-outbox."
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Durable Outbox Maintainers" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.14",
    "Typing :: Typed",
]
dependencies = [
    "durable-outbox",
    "azure-cosmos>=4.15.0",
]

[project.entry-points."durable_outbox.stores"]
cosmos = "durable_outbox_cosmos_store:build_cosmos_store"

[tool.uv.build-backend]
module-root = ""
module-name = "durable_outbox_cosmos_store"
source-include = ["LICENSE", "README.md", "pyproject.toml"]
