[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"

[project]
name = "durable-outbox-sql-store"
version = "0.1.0"
description = "SQL store plugin for durable-outbox."
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Durable Outbox Maintainers" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.14",
    "Typing :: Typed",
]
dependencies = [
    "durable-outbox",
    "pyodbc>=5.3.0",
]

[project.entry-points."durable_outbox.stores"]
azure-sql-sync = "durable_outbox_sql_store:build_azure_sql_sync_store"
sql-always-on = "durable_outbox_sql_store:build_sql_always_on_store"

[tool.uv.build-backend]
module-root = ""
module-name = "durable_outbox_sql_store"
source-include = ["LICENSE", "README.md", "pyproject.toml"]
