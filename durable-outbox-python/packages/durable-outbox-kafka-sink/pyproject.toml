[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"

[project]
name = "durable-outbox-kafka-sink"
version = "0.1.0"
description = "Kafka sink plugin for durable-outbox."
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Durable Outbox Maintainers" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.14",
    "Typing :: Typed",
]
dependencies = [
    "durable-outbox",
    "confluent-kafka>=2.14.0",
]

[project.entry-points."durable_outbox.sinks"]
kafka = "durable_outbox_kafka_sink:build_kafka_sink"

[tool.uv.build-backend]
module-root = ""
module-name = "durable_outbox_kafka_sink"
source-include = ["LICENSE", "README.md", "pyproject.toml"]
